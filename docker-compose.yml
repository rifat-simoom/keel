services:
  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: keel
      POSTGRES_PASSWORD: keel
      POSTGRES_DB: keel
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keel"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    restart: unless-stopped
    command: start-dev --import-realm
    ports:
      - "8280:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: dev-file
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./infrastructure/keycloak:/opt/keycloak/data/import
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 15s
      timeout: 10s
      retries: 20

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9100:9000"
      - "9101:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/keel-documents;
      mc anonymous set download local/keel-documents;
      exit 0;
      "

  # ── Backend services ─────────────────────────────────────────────────────────

  gateway:
    build:
      context: .
      dockerfile: backend/gateway/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - auth-service
      - banking-service
      - invoice-service
      - documents-service
      - tax-service
      - notifications-service

  auth-service:
    build:
      context: .
      dockerfile: backend/services/auth/Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://keel:keel@postgres:5432/keel
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: keel
      KEYCLOAK_CLIENT_ID: keel-api
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  invoice-service:
    build:
      context: .
      dockerfile: backend/services/invoice/Dockerfile
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: postgresql+asyncpg://keel:keel@postgres:5432/keel
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: keel
      KEYCLOAK_CLIENT_ID: keel-api
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/0
      RESEND_API_KEY: ""
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

  banking-service:
    build:
      context: .
      dockerfile: backend/services/banking/Dockerfile
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql+asyncpg://keel:keel@postgres:5432/keel
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: keel
      KEYCLOAK_CLIENT_ID: keel-api
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/0
      TRUELAYER_CLIENT_ID: ${TRUELAYER_CLIENT_ID:-}
      TRUELAYER_CLIENT_SECRET: ${TRUELAYER_CLIENT_SECRET:-}
      TRUELAYER_REDIRECT_URI: ${TRUELAYER_REDIRECT_URI:-http://localhost:5173/banking/callback}
      TRUELAYER_SANDBOX: ${TRUELAYER_SANDBOX:-true}
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  notifications-service:
    build:
      context: .
      dockerfile: backend/services/notifications/Dockerfile
    restart: unless-stopped
    ports:
      - "8006:8006"
    environment:
      DATABASE_URL: postgresql+asyncpg://keel:keel@postgres:5432/keel
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: keel
      KEYCLOAK_CLIENT_ID: keel-api
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      RESEND_API_KEY: ""
      NOTIFICATION_FROM_EMAIL: notifications@keelapp.co.uk
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  tax-service:
    build:
      context: .
      dockerfile: backend/services/tax/Dockerfile
    restart: unless-stopped
    ports:
      - "8005:8005"
    environment:
      DATABASE_URL: postgresql+asyncpg://keel:keel@postgres:5432/keel
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: keel
      KEYCLOAK_CLIENT_ID: keel-api
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

  documents-service:
    build:
      context: .
      dockerfile: backend/services/documents/Dockerfile
    restart: unless-stopped
    ports:
      - "8004:8004"
    environment:
      DATABASE_URL: postgresql+asyncpg://keel:keel@postgres:5432/keel
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: keel
      KEYCLOAK_CLIENT_ID: keel-api
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      S3_BUCKET: keel-documents
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      minio:
        condition: service_healthy

  # ── Frontend ─────────────────────────────────────────────────────────────────

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        VITE_KEYCLOAK_URL: http://localhost:8280
        VITE_KEYCLOAK_REALM: keel
        VITE_KEYCLOAK_CLIENT_ID: keel-web
        VITE_API_URL: http://localhost:8000
    restart: unless-stopped
    ports:
      - "3000:80"

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
  keycloak_data:
  minio_data:
