name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── TypeScript packages ─────────────────────────────────────────────────────
  ts-check:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter "@keel/types" --filter "@keel/utils" --filter "@keel/validation" --filter "@keel/api" build

      - name: Typecheck all
        run: pnpm typecheck

  # ── Backend Python services ────────────────────────────────────────────────
  python-lint:
    name: Python lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install shared package + tools
        run: |
          pip install -e backend/shared
          pip install ruff mypy

      - name: Ruff lint
        run: ruff check backend/

      - name: Mypy
        run: mypy backend/shared --ignore-missing-imports

  # ── Backend tests ──────────────────────────────────────────────────────────
  python-test:
    name: Python tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: keel
          POSTGRES_PASSWORD: keel
          POSTGRES_DB: keel_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      rabbitmq:
        image: rabbitmq:3
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e backend/shared
          pip install pytest pytest-asyncio

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://keel:keel@localhost:5432/keel_test
          RABBITMQ_URL: amqp://guest:guest@localhost:5672/
          REDIS_URL: redis://localhost:6379
        run: pytest backend/ -v --tb=short

  # ── Web tests ──────────────────────────────────────────────────────────────
  web-test:
    name: Web tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter "@keel/types" --filter "@keel/utils" --filter "@keel/validation" --filter "@keel/api" build

      - name: Run web tests
        run: pnpm --filter "@keel/web" test --run
