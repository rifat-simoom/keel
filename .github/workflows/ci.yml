name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── TypeScript typecheck ────────────────────────────────────────────────────
  ts-check:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter "@keel/types" --filter "@keel/utils" --filter "@keel/validation" --filter "@keel/api" build

      - name: Typecheck all
        run: pnpm typecheck

  # ── Python lint ─────────────────────────────────────────────────────────────
  python-lint:
    name: Python lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: |
          pip install setuptools
          pip install -e backend/shared
          pip install ruff mypy

      - name: Ruff lint
        run: ruff check backend/

      - name: Mypy
        run: mypy backend/shared --ignore-missing-imports

  # ── Python unit tests ───────────────────────────────────────────────────────
  python-test:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install setuptools
          pip install -e backend/shared
          pip install pytest

      - name: Run tests
        working-directory: backend
        run: pytest -v --tb=short

  # ── Web tests ───────────────────────────────────────────────────────────────
  web-test:
    name: Web tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter "@keel/types" --filter "@keel/utils" --filter "@keel/validation" --filter "@keel/api" build

      - name: Run web tests
        run: pnpm --filter "@keel/web" test -- --run
